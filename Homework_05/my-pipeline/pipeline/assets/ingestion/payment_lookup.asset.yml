name: ingestion.payment_lookup
type: duckdb.seed
parameters:
  path: payment_lookup.csv

columns:
  - name: payment_type_id
    type: integer
    description: "Unique identifier for a payment method"
    primary_key: true
    checks:
      - name: not_null
      - name: unique
  - name: payment_type_name
    type: string
    description: "Human‑readable payment type description"
    checks:
      - name: not_null
